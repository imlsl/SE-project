<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>智能城市生成系统 | 系统管理员</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .setting-btn {
            background: rgba(56, 189, 248, 0.2);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.75rem;
            color: #38bdf8;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .setting-btn:hover {
            background: rgba(56, 189, 248, 0.4);
            transform: translateY(-1px);
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            width: 100%;
            justify-content: flex-end;
        }
        
        /* 弹窗样式 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            animation: fadeIn 0.2s ease;
        }
        
        .modal-content {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-radius: 1rem;
            padding: 1.5rem;
            width: 90%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(56, 189, 248, 0.2);
            animation: slideUp 0.3s ease;
        }
        
        /* 自定义滚动条样式 */
        .modal-content::-webkit-scrollbar {
            width: 8px;
        }
        
        .modal-content::-webkit-scrollbar-track {
            background: #0f172a;
            border-radius: 10px;
        }
        
        .modal-content::-webkit-scrollbar-thumb {
            background: #38bdf8;
            border-radius: 10px;
        }
        
        .modal-content::-webkit-scrollbar-thumb:hover {
            background: #0ea5e9;
        }
        
        .modal-content h3 {
            margin-bottom: 1.5rem;
            color: #f1f5f9;
            font-size: 1.25rem;
            border-bottom: 2px solid #38bdf8;
            padding-bottom: 0.5rem;
            display: inline-block;
        }
        
        .modal-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        
        .input-group {
            margin-bottom: 1.25rem;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #94a3b8;
            font-size: 0.875rem;
            font-weight: 500;
        }
        
        .input-group input,
        .input-group select {
            width: 100%;
            padding: 0.625rem 0.75rem;
            border-radius: 0.5rem;
            background: #0f172a;
            border: 1px solid #334155;
            color: #e2e8f0;
            font-size: 0.875rem;
            transition: all 0.2s;
        }
        
        .input-group input:focus,
        .input-group select:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.1);
        }
        
        /* 用户表格容器 - 固定高度，纵向滚动 */
        .user-table-container {
            max-height: 400px;
            overflow-y: auto;
            overflow-x: auto;
            margin-top: 1rem;
            border-radius: 0.5rem;
        }
        
        .user-table-container::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        .user-table-container::-webkit-scrollbar-track {
            background: #0f172a;
            border-radius: 10px;
        }
        
        .user-table-container::-webkit-scrollbar-thumb {
            background: #38bdf8;
            border-radius: 10px;
        }
        
        .user-table-container::-webkit-scrollbar-thumb:hover {
            background: #0ea5e9;
        }
        
        /* 表格样式 */
        .user-table {
            width: 100%;
            min-width: 700px;
            border-collapse: collapse;
        }
        
        .user-table thead {
            position: sticky;
            top: 0;
            background: #1e293b;
            z-index: 10;
        }
        
        .user-table th {
            text-align: left;
            padding: 0.75rem 0.5rem;
            color: #94a3b8;
            font-weight: 600;
            font-size: 0.875rem;
            border-bottom: 2px solid #334155;
            background: #1e293b;
        }
        
        .user-table td {
            padding: 0.75rem 0.5rem;
            border-bottom: 1px solid #1e293b;
            color: #e2e8f0;
            font-size: 0.875rem;
        }
        
        .user-table tbody tr:hover {
            background: rgba(56, 189, 248, 0.05);
        }
        
        /* 状态徽章 */
        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            border-radius: 0.5rem;
            font-size: 0.7rem;
            font-weight: 500;
        }
        
        .status-active {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }
        
        .status-inactive {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
        
        /* 表格信息栏 */
        .table-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding: 0.5rem 0;
            color: #94a3b8;
            font-size: 0.875rem;
        }
        
        .btn {
            background: linear-gradient(135deg, #38bdf8 0%, #0ea5e9 100%);
            color: #0f172a;
            padding: 0.625rem 1rem;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            flex: 1;
            transition: all 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3);
        }
        
        .btn-outline {
            background: transparent;
            border: 1px solid #38bdf8;
            color: #38bdf8;
            padding: 0.625rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            flex: 1;
            transition: all 0.2s;
        }
        
        .btn-outline:hover {
            background: rgba(56, 189, 248, 0.1);
            transform: translateY(-2px);
        }
        
        .small-btn {
            background: rgba(56, 189, 248, 0.2);
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 0.5rem;
            color: #38bdf8;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        
        .small-btn.outline {
            background: transparent;
            border: 1px solid #38bdf8;
        }
        
        .small-btn:hover {
            background: rgba(56, 189, 248, 0.4);
            transform: translateY(-1px);
        }
        
        .logout-btn {
            background: rgba(239, 68, 68, 0.2);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.75rem;
            color: #ef4444;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.4);
            transform: translateY(-1px);
        }
        
        /* 动画 */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        
        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .user-table-container {
                max-height: 350px;
            }
            
            .modal-content {
                width: 95%;
                padding: 1rem;
            }
            
            .modal-buttons {
                flex-direction: column;
            }
            
            .btn, .btn-outline {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="bg-glow"></div>
<div class="bg-glow bg-glow-left"></div>

<div class="app-container">
    <div class="dashboard">
        <div class="top-navbar">
            <div class="nav-brand">SmartCity Admin</div>
            <div class="user-info">
                <button class="setting-btn" id="profileBtn"><i class="fas fa-user-circle"></i> 个人设置</button>
                <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> 退出</button>
            </div>
        </div>
        <div id="roleSpecificPanel"></div>
    </div>
</div>

<script src="js/role/baseRole.js"></script>
<script src="js/role/systemAdmin.js"></script>
<script src="js/auth.js"></script>
<script src="js/common.js"></script>
<script>
    const authManager = new AuthManager();
    
    // 检查登录状态
    function checkAuth() {
        if (!authManager.isLoggedIn()) {
            window.location.href = 'index.html';
            return false;
        }
        
        const currentUser = authManager.getCurrentUser();
        if (currentUser.role !== 'system_admin') {
            alert('权限不足，请使用管理员账号登录');
            window.location.href = 'index.html';
            return false;
        }
        
        return true;
    }
    
    if (checkAuth()) {
        const currentUser = authManager.getCurrentUser();
        
        const adminUI = new SystemAdminUI('roleSpecificPanel', currentUser.username);
        adminUI.render();
    }
    
    // 个人设置按钮
    document.getElementById('profileBtn').addEventListener('click', () => {
        window.location.href = 'profile.html';
    });
    
    // 退出登录
    document.getElementById('logoutBtn').addEventListener('click', () => {
        authManager.logout();
        window.location.href = 'index.html';
    });
</script>
</body>
</html>
