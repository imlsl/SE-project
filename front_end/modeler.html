<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>智能城市生成系统 | 场景建模师</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .setting-btn {
            background: rgba(56, 189, 248, 0.2);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.75rem;
            color: #38bdf8;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .setting-btn:hover {
            background: rgba(56, 189, 248, 0.4);
            transform: translateY(-1px);
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            width: 100%;
            justify-content: flex-end;
        }
    </style>
</head>
<body>
<div class="bg-glow"></div>
<div class="bg-glow bg-glow-left"></div>

<div class="app-container">
    <div class="dashboard">
        <div class="top-navbar">
            <div class="nav-brand">SmartCity Modeler</div>
            <div class="user-info">
                <button class="setting-btn" id="profileBtn"><i class="fas fa-user-circle"></i> 个人设置</button>
                <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> 退出</button>
            </div>
        </div>
        <div id="roleSpecificPanel"></div>
    </div>
</div>

<script src="js/role/baseRole.js"></script>
<script src="js/role/sceneModeler.js"></script>
<script src="js/auth.js"></script>
<script src="js/common.js"></script>
<script>
    const authManager = new AuthManager();
    
    function checkAuth() {
        if (!authManager.isLoggedIn()) {
            window.location.href = 'index.html';
            return false;
        }
        
        const currentUser = authManager.getCurrentUser();
        if (currentUser.role !== 'scene_modeler') {
            alert('权限不足');
            window.location.href = 'index.html';
            return false;
        }
        
        return true;
    }
    
    if (checkAuth()) {
        const currentUser = authManager.getCurrentUser();
        //document.getElementById('currentUsernameSpan').textContent = currentUser.username;
        
        const modelerUI = new SceneModelerUI('roleSpecificPanel', currentUser.username);
        modelerUI.render();
    }
    
    // 个人设置按钮
    document.getElementById('profileBtn').addEventListener('click', () => {
        window.location.href = 'profile.html';
    });
    
    document.getElementById('logoutBtn').addEventListener('click', () => {
        authManager.logout();
        window.location.href = 'index.html';
    });
</script>
</body>
</html>
