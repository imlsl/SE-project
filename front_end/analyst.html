<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>智能城市生成系统 | 行业分析师</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="bg-glow"></div>
<div class="bg-glow bg-glow-left"></div>

<div class="app-container">
    <div class="dashboard">
        <div class="top-navbar">
            <div class="nav-brand">SmartCity Analyst</div>
            <div class="user-info">
                <button class="setting-btn" id="profileBtn"><i class="fas fa-user-circle"></i> 个人设置</button>
                <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> 退出</button>
            </div>
        </div>
        <div id="roleSpecificPanel"></div>
    </div>
</div>

<script src="js/role/baseRole.js"></script>
<script src="js/role/industryAnalyst.js"></script>
<script src="js/auth.js"></script>
<script src="js/common.js"></script>
<script>
    const session = requireLogin({
        expectedRole: 'industry_analyst',
        deniedMessage: '权限不足'
    });

    if (session) {
        const analystUI = new IndustryAnalystUI('roleSpecificPanel', session.currentUser.username);
        analystUI.render();
    }
    
    bindShellActions({ authManager: session ? session.authManager : new AuthManager() });
</script>
</body>
</html>
