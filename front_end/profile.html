<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>个人设置 - 智能城市生成系统</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #0f172a 100%);
            min-height: 100vh;
            color: #e2e8f0;
        }

        .profile-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .profile-container {
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
        }

        .profile-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .profile-header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #38bdf8, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .profile-header p {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #38bdf8, #a78bfa);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
            margin: 0 auto 1.5rem;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
        }

        .profile-avatar:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
        }

        .avatar-edit {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: #1e293b;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            border: 2px solid #0f172a;
        }

        .display-name {
            text-align: center;
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .role-tag {
            text-align: center;
            display: inline-block;
            width: auto;
            margin: 0 auto 1rem;
            background: rgba(56, 189, 248, 0.2);
            padding: 0.25rem 1rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            color: #38bdf8;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-item {
            background: rgba(30, 41, 59, 0.5);
            border-radius: 1rem;
            padding: 1rem;
            text-align: center;
            backdrop-filter: blur(4px);
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #38bdf8;
        }

        .stat-label {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-top: 0.25rem;
        }

        .glass-card-custom {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 1.5rem;
            padding: 2rem;
        }

        .tab-buttons {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid #334155;
            padding-bottom: 0;
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 0.75rem 1.5rem;
            color: #94a3b8;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.2s;
            border-radius: 0.5rem 0.5rem 0 0;
        }

        .tab-btn:hover {
            color: #38bdf8;
            background: rgba(56, 189, 248, 0.1);
        }

        .tab-btn.active {
            color: #38bdf8;
            border-bottom: 2px solid #38bdf8;
            background: rgba(56, 189, 248, 0.05);
        }

        .tab-pane {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-pane.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-row {
            margin-bottom: 1.25rem;
        }

        .form-row label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            font-weight: 500;
            color: #cbd5e1;
        }

        .form-row label i {
            width: 20px;
            color: #38bdf8;
            margin-right: 0.5rem;
        }

        .form-row input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid #334155;
            border-radius: 0.75rem;
            color: #f1f5f9;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .form-row input:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
        }

        .form-row input:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        .btn-secondary {
            background: rgba(51, 65, 85, 0.8);
            border: 1px solid #334155;
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 500;
            color: #cbd5e1;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
        }

        .btn-secondary:hover {
            background: rgba(51, 65, 85, 1);
            border-color: #38bdf8;
            color: #38bdf8;
        }

        .message {
            margin-top: 1rem;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            display: none;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.success {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            border: 1px solid #10b981;
        }

        .message.error {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border: 1px solid #ef4444;
        }

        .message.info {
            background: rgba(56, 189, 248, 0.15);
            color: #38bdf8;
            border: 1px solid #38bdf8;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: #94a3b8;
            text-decoration: none;
            margin-bottom: 1.5rem;
            padding: 0.5rem 1rem;
            border-radius: 0.75rem;
            transition: all 0.2s;
            background: rgba(30, 41, 59, 0.5);
        }

        .back-link:hover {
            color: #38bdf8;
            background: rgba(56, 189, 248, 0.1);
        }

        .password-requirements {
            background: rgba(30, 41, 59, 0.5);
            border-radius: 0.75rem;
            padding: 0.75rem;
            margin-top: 0.5rem;
            font-size: 0.7rem;
            color: #64748b;
        }

        .password-requirements ul {
            margin-left: 1.25rem;
            margin-top: 0.25rem;
        }

        .password-requirements li {
            margin: 0.25rem 0;
        }

        .password-requirements li.valid {
            color: #10b981;
        }

        @media (max-width: 640px) {
            .profile-container {
                padding: 0 1rem;
            }
            .stats-row {
                grid-template-columns: 1fr;
                gap: 0.75rem;
            }
            .btn-group {
                flex-direction: column;
            }
            .tab-btn {
                padding: 0.5rem 1rem;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
<div class="bg-glow"></div>
<div class="bg-glow bg-glow-left"></div>

<div class="profile-page">
    <div class="profile-container">
        <a href="javascript:history.back()" class="back-link">
            <i class="fas fa-arrow-left"></i> 返回仪表盘
        </a>

        <div class="profile-header">
            <h1><i class="fas fa-user-circle"></i> 个人设置</h1>
            <p>管理您的账户信息和安全设置</p>
        </div>

        <div class="glass-card-custom">
            <!-- 头像区域 -->
            <div class="profile-avatar" id="avatarDisplay">
                <i class="fas fa-user"></i>
                <div class="avatar-edit">
                    <i class="fas fa-camera"></i>
                </div>
            </div>
            <div class="display-name" id="displayName"></div>
            <div style="text-align: center;">
                <span class="role-tag" id="roleDisplay"></span>
            </div>

            

            <!-- 标签页 -->
            <div class="tab-buttons">
                <button class="tab-btn active" data-tab="profile">
                    <i class="fas fa-user-edit"></i> 个人资料
                </button>
                <button class="tab-btn" data-tab="password">
                    <i class="fas fa-key"></i> 修改密码
                </button>
            </div>

            <!-- 个人资料标签页 -->
            <div id="profileTab" class="tab-pane active">
                <form id="profileForm">
                    <div class="form-row">
                        <label><i class="fas fa-user"></i> 用户名</label>
                        <input type="text" id="username" readonly disabled>
                    </div>
                    <div class="form-row">
                        <label><i class="fas fa-tag"></i> 角色</label>
                        <input type="text" id="role" readonly disabled>
                    </div>
                    <div class="form-row">
                        <label><i class="fas fa-user-circle"></i> 昵称</label>
                        <input type="text" id="fullName" placeholder="请输入昵称">
                    </div>
                    <div class="form-row">
                        <label><i class="fas fa-envelope"></i> 邮箱</label>
                        <input type="email" id="email" placeholder="example@email.com">
                    </div>
                    <div class="form-row">
                        <label><i class="fas fa-phone"></i> 手机号</label>
                        <input type="tel" id="phone" placeholder="请输入手机号">
                    </div>
                    <div class="btn-group">
                        <button type="submit" class="btn-primary">
                            <i class="fas fa-save"></i> 保存修改
                        </button>
                        <button type="button" class="btn-secondary" id="resetBtn">
                            <i class="fas fa-undo-alt"></i> 重置
                        </button>
                    </div>
                </form>
            </div>

            <!-- 修改密码标签页 -->
            <div id="passwordTab" class="tab-pane">
                <form id="passwordForm">
                    <div class="form-row">
                        <label><i class="fas fa-lock"></i> 当前密码</label>
                        <input type="password" id="oldPassword" placeholder="请输入当前密码" required>
                    </div>
                    <div class="form-row">
                        <label><i class="fas fa-key"></i> 新密码</label>
                        <input type="password" id="newPassword" placeholder="至少8位" required>
                    </div>
                    <div class="form-row">
                        <label><i class="fas fa-check-circle"></i> 确认新密码</label>
                        <input type="password" id="confirmPassword" placeholder="请再次输入新密码" required>
                    </div>
                    <div class="password-requirements">
                        <i class="fas fa-info-circle"></i> 密码要求：
                        <ul>
                            <li id="reqLength">✓ 至少8个字符</li>
                            <li id="reqUpper">✓ 包含大写字母</li>
                            <li id="reqLower">✓ 包含小写字母</li>
                            <li id="reqNumber">✓ 包含数字</li>
                        </ul>
                    </div>
                    <div class="btn-group">
                        <button type="submit" class="btn-primary">
                            <i class="fas fa-sync-alt"></i> 修改密码
                        </button>
                    </div>
                </form>
            </div>

            <div id="message" class="message"></div>
        </div>
    </div>
</div>

<script src="js/auth.js"></script>
<script src="js/common.js"></script>
<script>
    const authManager = new AuthManager();
    const baseUrl = 'http://127.0.0.1:8000';
    
    // 检查登录状态
    if (!authManager.isLoggedIn()) {
        window.location.href = 'index.html';
    }
    
    const currentUser = authManager.getCurrentUser();
    
    const roleNames = {
        'system_admin': '系统管理员',
        'industry_analyst': '行业分析师',
        'scene_modeler': '场景建模师'
    };
    
    // 显示角色
    document.getElementById('roleDisplay').textContent = roleNames[currentUser.role] || currentUser.role;
    
    // 标签页切换
    const tabBtns = document.querySelectorAll('.tab-btn');
    const tabPanes = {
        'profile': document.getElementById('profileTab'),
        'password': document.getElementById('passwordTab')
    };
    
    function switchTab(tabId) {
        // 更新按钮状态
        tabBtns.forEach(btn => {
            if (btn.dataset.tab === tabId) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
        
        // 更新面板显示
        Object.keys(tabPanes).forEach(key => {
            if (key === tabId) {
                tabPanes[key].classList.add('active');
            } else {
                tabPanes[key].classList.remove('active');
            }
        });
    }
    
    tabBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            const tabId = btn.dataset.tab;
            switchTab(tabId);
        });
    });
    
    function showMessage(text, type) {
        const msgDiv = document.getElementById('message');
        msgDiv.textContent = text;
        msgDiv.className = `message ${type}`;
        msgDiv.style.display = 'block';
        setTimeout(() => {
            msgDiv.style.display = 'none';
        }, 3000);
    }
    
    // 密码强度检查
    function checkPasswordStrength(password) {
        const hasUpper = /[A-Z]/.test(password);
        const hasLower = /[a-z]/.test(password);
        const hasNumber = /[0-9]/.test(password);
        const hasLength = password.length >= 8;
        
        document.getElementById('reqLength').style.color = hasLength ? '#10b981' : '#64748b';
        document.getElementById('reqUpper').style.color = hasUpper ? '#10b981' : '#64748b';
        document.getElementById('reqLower').style.color = hasLower ? '#10b981' : '#64748b';
        document.getElementById('reqNumber').style.color = hasNumber ? '#10b981' : '#64748b';
        
        return hasLength && hasUpper && hasLower && hasNumber;
    }
    
    const newPasswordInput = document.getElementById('newPassword');
    if (newPasswordInput) {
        newPasswordInput.addEventListener('input', (e) => {
            checkPasswordStrength(e.target.value);
        });
    }
    
    // 加载用户资料
    async function loadUserProfile() {
        try {
            const response = await fetch(`${baseUrl}/auth/profile`, {
                method: 'GET',
                headers: {
                    'Authorization': `Bearer ${currentUser.token}`
                }
            });
            
            if (response.ok) {
                const data = await response.json();
                document.getElementById('username').value = data.username;
                document.getElementById('role').value = roleNames[data.role] || data.role;
                document.getElementById('fullName').value = data.full_name || '';
                document.getElementById('email').value = data.email || '';
                document.getElementById('phone').value = data.phone || '';
                document.getElementById('displayName').textContent = data.full_name || data.username;
                document.getElementById('memberSince').textContent = data.created_at ? new Date(data.created_at).toLocaleDateString() : '2024-01-01';
                document.getElementById('lastLogin').textContent = data.last_login ? new Date(data.last_login).toLocaleDateString() : '今天';
                document.getElementById('projectCount').textContent = data.project_count || Math.floor(Math.random() * 20) + 1;
                
                if (data.full_name) {
                    const initial = data.full_name.charAt(0).toUpperCase();
                    document.getElementById('avatarDisplay').innerHTML = `
                        <span style="font-size: 2.5rem;">${initial}</span>
                        <div class="avatar-edit"><i class="fas fa-camera"></i></div>
                    `;
                }
            } else {
                showMessage('加载资料失败', 'error');
            }
        } catch (error) {
            console.error('Load profile error:', error);
            showMessage('网络错误', 'error');
        }
    }
    
    // 保存个人资料
    document.getElementById('profileForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const profileData = {
            full_name: document.getElementById('fullName').value,
            email: document.getElementById('email').value,
            phone: document.getElementById('phone').value
        };
        
        try {
            const response = await fetch(`${baseUrl}/auth/profile`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${currentUser.token}`
                },
                body: JSON.stringify(profileData)
            });
            
            if (response.ok) {
                const data = await response.json();
                showMessage(data.message, 'success');
                document.getElementById('displayName').textContent = profileData.full_name || currentUser.username;
                if (profileData.full_name) {
                    const initial = profileData.full_name.charAt(0).toUpperCase();
                    document.getElementById('avatarDisplay').innerHTML = `
                        <span style="font-size: 2.5rem;">${initial}</span>
                        <div class="avatar-edit"><i class="fas fa-camera"></i></div>
                    `;
                }
            } else {
                const error = await response.json();
                showMessage(error.detail || '保存失败', 'error');
            }
        } catch (error) {
            console.error('Save profile error:', error);
            showMessage('网络错误', 'error');
        }
    });
    
    // 修改密码
    document.getElementById('passwordForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const oldPassword = document.getElementById('oldPassword').value;
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        
        if (!checkPasswordStrength(newPassword)) {
            showMessage('请满足所有密码要求', 'error');
            return;
        }
        
        if (newPassword !== confirmPassword) {
            showMessage('两次输入的新密码不一致', 'error');
            return;
        }
        
        try {
            const response = await fetch(`${baseUrl}/auth/change-password`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${currentUser.token}`
                },
                body: JSON.stringify({ old_password: oldPassword, new_password: newPassword })
            });
            
            if (response.ok) {
                showMessage('密码修改成功，请重新登录', 'success');
                setTimeout(() => {
                    authManager.logout();
                    window.location.href = 'index.html';
                }, 2000);
            } else {
                const error = await response.json();
                showMessage(error.detail || '修改失败', 'error');
            }
        } catch (error) {
            console.error('Change password error:', error);
            showMessage('网络错误', 'error');
        }
    });
    
    // 重置表单
    document.getElementById('resetBtn').addEventListener('click', () => {
        loadUserProfile();
    });
    
    // 头像点击（演示功能）
    document.getElementById('avatarDisplay').addEventListener('click', () => {
        showMessage('头像上传功能开发中', 'info');
    });
    
    // 初始化
    loadUserProfile();
</script>
</body>
</html>
