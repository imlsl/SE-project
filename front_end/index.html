<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>智能城市生成系统 | SmartCity Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="bg-glow"></div>
<div class="bg-glow bg-glow-left"></div>

<div class="app-container" id="appRoot">
    <!-- 登录/注册视图 -->
    <div id="authView">
        <div class="auth-wrapper">
            <div class="glass-card auth-card">
                <div class="logo">SmartCity Generator</div>
                <div class="tagline">智能城市生成系统</div>
                <div id="authTabs" style="display: flex; gap: 1rem; margin-bottom: 1.5rem;">
                    <button class="btn-outline" style="flex:1;" id="loginTabBtn">登录</button>
                    <button class="btn-outline" style="flex:1;" id="registerTabBtn">注册</button>
                </div>
                <div id="loginForm">
                    <div class="input-group">
                        <label>用户名</label>
                        <div class="input-with-icon"><i class="fas fa-user"></i><input type="text" id="loginUsername" placeholder="请输入用户名"></div>
                    </div>
                    <div class="input-group">
                        <label>密码</label>
                        <div class="input-with-icon"><i class="fas fa-lock"></i><input type="password" id="loginPassword" placeholder="密码"></div>
                    </div>
                    <button class="btn" id="doLoginBtn">登录系统</button>
                    <div class="switch-text">没有账号？ <span id="toRegisterBtn">立即注册</span></div>
                </div>
                <div id="registerForm" style="display:none;">
                    <div class="input-group">
                        <label>用户名</label>
                        <div class="input-with-icon"><i class="fas fa-user-plus"></i><input type="text" id="regUsername" placeholder="3~20个字符"></div>
                    </div>
                    <div class="input-group">
                        <label>密码</label>
                        <div class="input-with-icon"><i class="fas fa-key"></i><input type="password" id="regPassword" placeholder="至少6位"></div>
                    </div>
                    <div class="input-group">
                        <label>选择角色</label>
                        <select id="regRole">
                            <option value="industry_analyst">行业分析师</option>
                            <option value="scene_modeler">场景建模师</option>
                        </select>
                       
                    </div>
                    <button class="btn" id="doRegisterBtn">注册新账号</button>
                    <div class="switch-text">已有账号？ <span id="toLoginBtn">立即登录</span></div>
                </div>
                <div id="authMessage" style="margin-top: 1rem; font-size: 0.85rem; color: #f97316;"></div>
            </div>
        </div>
    </div>

    <div id="dashboardView" class="dashboard">
        <div class="top-navbar">
            <div class="user-info">
                <span class="role-badge" id="currentRoleLabel"></span>
                <span id="currentUsernameSpan" style="font-weight:500;"></span>
                <button class="setting-btn" id="settingBtn"><i class="fas fa-cog"></i>个人设置</button>
                <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> 退出</button>
            </div>
        </div>
        <div id="roleSpecificPanel"></div>
        
    </div>
</div>

<script src="js/role/baseRole.js"></script>
<script src="js/role/industryAnalyst.js"></script>
<script src="js/role/sceneModeler.js"></script>
<script src="js/role/systemAdmin.js"></script>
<script src="js/auth.js"></script>
<script src="js/dashBoard.js"></script>
<script src="js/blenderBridge.js"></script>
<script src="js/app.js"></script>
</body>
</html>
